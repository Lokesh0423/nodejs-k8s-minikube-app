name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nodejs-k8s-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/nodejs-k8s-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/nodejs-k8s-app:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-k8s-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-k8s-app:latest

      - name: Image build summary
        run: echo "Docker image pushed successfully as ${{ secrets.DOCKER_USERNAME }}/nodejs-k8s-app:${{ github.sha }}"
